<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Calculator | Official Trading Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-900 antialiased">
    <header></header>

    <main class="max-w-[1200px] mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-[1fr_200px_1fr] gap-10 items-center">
            <!-- Left Side: You -->
            <div class="reveal p-8 bg-white border border-slate-200 rounded-[3rem] hover:-translate-y-1 transition-all duration-500">
                <h2 class="text-2xl font-normal mb-6 flex justify-between items-center tracking-tight">
                    <div class="flex items-center gap-4">
                        <span>Your Offer</span>
                        <button onclick="clearTrade('your')" class="text-[9px] uppercase tracking-[0.2em] px-2 py-0.5 bg-slate-100 rounded-md text-slate-400 hover:text-red-500 transition-all leading-none">Clear</button>
                    </div>
                    <span id="yourTotal" class="text-indigo-600">0</span>
                </h2>
                <div class="mb-4 text-[10px] text-slate-400 dark:text-white uppercase tracking-widest">
                    Items: <span id="yourItemCount" class="text-indigo-500">0</span>
                </div>
                <div id="yourTradeGrid" class="grid grid-cols-3 sm:grid-cols-4 gap-4 min-h-[200px] mb-6">
                    <!-- Items added here -->
                </div>
                <div class="flex flex-col gap-4">
                    <button onclick="showItemPicker('your')" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50/30 transition-all text-sm font-normal tracking-wide">+ ADD ITEM</button>
                    <div class="flex items-center gap-3 bg-slate-50/80 p-4 rounded-[2rem] border border-slate-100 transition-all">
                        <div class="flex flex-col min-w-[60px]">
                            <span class="text-[9px] font-normal uppercase tracking-widest text-slate-400 dark:text-white">Gems</span>
                            <span id="yourGemsDisplay" class="text-[12px] font-normal text-indigo-600 leading-tight"></span>
                        </div>
                        <input type="number" id="yourGems" min="0" step="100000" placeholder="0 gems..." class="bg-transparent w-full outline-none text-base text-right pr-2 font-normal text-indigo-600" oninput="if(typeof updateTradeTotals === 'function') updateTradeTotals()">
                    </div>
                </div>
            </div>

            <!-- Center: Verdict -->
            <div id="verdictBanner" class="flex flex-col items-center justify-center text-center mx-auto shrink-0">
                <span class="text-[11px] font-normal uppercase tracking-[0.3em] text-slate-400 dark:text-white mb-2 block">Verdict</span>
                <h3 id="verdictText" class="text-6xl font-normal tracking-tighter transition-all duration-500">F</h3>
                <button onclick="generateShareLink()" class="mt-6 px-6 py-2.5 bg-blue-600 text-white rounded-2xl text-[10px] uppercase tracking-widest font-normal hover:bg-blue-700 transition-all shadow-md">Generate Share Link</button>
                <div class="w-24 h-1 bg-slate-100 rounded-full mt-4 overflow-hidden">
                    <div id="fairnessMeter" class="h-full bg-indigo-600 transition-all duration-500" style="width: 50%"></div>
                </div>
            </div>

            <!-- Right Side: Them -->
            <div class="reveal p-8 bg-white border border-slate-200 rounded-[3rem] hover:-translate-y-1 transition-all duration-500">
                <h2 class="text-2xl font-normal mb-6 flex justify-between items-center tracking-tight">
                    <div class="flex items-center gap-4">
                        <span>Their Offer</span>
                        <button onclick="clearTrade('their')" class="text-[9px] uppercase tracking-[0.2em] px-2 py-0.5 bg-slate-100 rounded-md text-slate-400 hover:text-red-500 transition-all leading-none">Clear</button>
                    </div>
                    <span id="theirTotal" class="text-emerald-600">0</span>
                </h2>
                <div class="mb-4 text-[10px] text-slate-400 dark:text-white uppercase tracking-widest">
                    Items: <span id="theirItemCount" class="text-emerald-500">0</span>
                </div>
                <div id="theirTradeGrid" class="grid grid-cols-3 sm:grid-cols-4 gap-4 min-h-[200px] mb-6">
                    <!-- Items added here -->
                </div>
                <div class="flex flex-col gap-4">
                    <button onclick="showItemPicker('their')" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 hover:border-emerald-400 hover:text-emerald-600 hover:bg-emerald-50/30 transition-all text-sm font-normal tracking-wide">+ ADD ITEM</button>
                    <div class="flex items-center gap-3 bg-slate-50/80 p-4 rounded-[2rem] border border-slate-100 transition-all">
                        <div class="flex flex-col min-w-[60px]">
                            <span class="text-[9px] font-normal uppercase tracking-widest text-slate-400 dark:text-white">Gems</span>
                            <span id="theirGemsDisplay" class="text-[12px] font-normal text-emerald-600 leading-tight"></span>
                        </div>
                        <input type="number" id="theirGems" min="0" step="100000" placeholder="0 gems..." class="bg-transparent w-full outline-none text-base text-right pr-2 font-normal text-emerald-600" oninput="if(typeof updateTradeTotals === 'function') updateTradeTotals()">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <!-- Item Selection Modal -->
    <div id="pickerModal" class="fixed inset-0 z-[100] invisible opacity-0 flex items-center justify-center p-4 bg-slate-950/80 transition-all duration-300 pointer-events-none">
        <div class="bg-white rounded-[32px] max-w-2xl w-full max-h-[80vh] overflow-hidden flex flex-col transform transition-transform duration-300">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <input type="text" id="pickerSearch" placeholder="Search items..." class="bg-slate-100 px-4 py-2 rounded-xl text-sm outline-none w-full mr-4">
                <select id="pickerRarity" class="bg-transparent text-slate-500 text-[11px] font-normal uppercase tracking-wider cursor-pointer hover:text-indigo-600 transition-colors focus:outline-none mr-4" onchange="renderPickerGrid()">
                    <option value="all">All</option>
                    <option value="Huge">Huge</option>
                    <option value="Secret">Secret</option>
                </select>
                <button onclick="closePicker()" class="text-slate-400">&times;</button>
            </div>
            <div id="pickerGrid" class="grid grid-cols-7 gap-4 p-6 overflow-y-auto font-normal"></div>
        </div>
    </div>

    <script src="animations.js"></script>
    <script src="components.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
