<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Values | Official Trading Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-900 antialiased">
    <header></header>

    <main class="max-w-[1600px] mx-auto px-4 py-6">
        <div class="mb-6 px-2 flex flex-wrap items-center gap-8 border-b border-slate-100 pb-4">
            <span class="text-[10px] font-normal uppercase tracking-widest text-black dark:text-white">Items: <span id="totalPets" class="text-indigo-600 dark:text-indigo-400">0</span></span>
            <span class="text-[10px] font-normal uppercase tracking-widest text-black dark:text-white">Market Value: <span id="marketValue" class="text-emerald-600 dark:text-emerald-400">0</span></span>
        </div>
        <div id="collectionStats" class="mb-8 px-2 hidden"></div>

        <div id="petGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 content-start">
            <!-- Dynamic Content Injected via JS -->
        </div>

        <!-- Pagination Controls -->
        <div id="pagination" class="flex justify-center items-center gap-2 mt-8">
            <!-- Pagination buttons will be injected here with pagination-hover class -->
        </div>
    </main>

    <footer></footer>

    <div id="petModal" class="fixed inset-0 z-[100] invisible opacity-0 flex items-center justify-center p-4 bg-slate-950/80 transition-all duration-300 pointer-events-none">
        <div class="bg-white rounded-[2.5rem] max-w-2xl w-full overflow-hidden transform transition-all duration-300">
             <div id="modalContent">
                <!-- Content injected via JS -->
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-900 text-white rounded-xl text-sm font-normal hover:bg-slate-800 transition-colors" style="font-weight: 400;">Close View</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[70] bg-indigo-600 text-white px-6 py-3 rounded-2xl font-normal text-sm opacity-0 invisible translate-y-10 transition-all duration-300 pointer-events-none">Copied!</div>

    <script src="animations.js"></script>
    <script src="components.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
